name: Pull Request Checks
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  checks:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛒
        uses: actions/checkout@v7

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies 📦
        run: npm ci

      - name: Lint 🔍
        run: npm run lint

      - name: Test 🧪
        run: npm test
